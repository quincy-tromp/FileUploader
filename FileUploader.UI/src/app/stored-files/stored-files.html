<div class="stored-files">
	<p>Your stored files:</p>

	<table class="table">
		<thead>
			<tr>
				<th>File Name</th>
				<th>Content Type</th>
				<th>Uploaded At</th>
				<th></th>
			</tr>
		</thead>
		<tbody>
			@for (file of files(); track file.id) {
				<tr>
					<td>{{ file.originalFileName }}</td>
					<td>{{ file.contentType ?? 'N/A' }}</td>
					<td>{{ file.uploadedAtUtc | date:'long' }}</td>
					<td>
						<button class="btn btn-primary" (click)="downloadFile(file.id)">
                            Download
                        </button>
					</td>
				</tr>
			}
		</tbody>
	</table>
</div>
